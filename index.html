
    </div>

    <!-- Main Logic -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbywMDzF7GtAFrC7dMZXoE05dZeqFCnFZeON9CO1TZnvn1dR79wHk_mrN6Fx5Wc_Ox0/exec";
        
        let globalData = [];
        let uniqueMachines = [];
        let summaryChartInstance = null;
        let completedChartInstance = null;
        let allMachinesSelected = true;
        let currentTab = 'tab-summary';

        Chart.register(ChartDataLabels);
        Chart.defaults.font.family = "'Sarabun', sans-serif";

        // Mobile menu
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('absolute');
            sidebar.classList.toggle('h-full');
            sidebar.classList.toggle('shadow-2xl');
        });

        // Tab Switching Logic
        function switchTab(tabId) {
            currentTab = tabId;
            
            // Hide all tabs
            document.getElementById('tab-summary').classList.add('hidden');
            document.getElementById('tab-production').classList.add('hidden');
            document.getElementById('tab-completed').classList.add('hidden');
            
            // Reset Nav styling
            const navIds = ['nav-summary', 'nav-production', 'nav-completed'];
            navIds.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('bg-indigo-50', 'text-indigo-700');
                el.classList.add('text-slate-600', 'hover:bg-slate-50');
                el.querySelector('svg').classList.remove('text-indigo-500');
                el.querySelector('svg').classList.add('text-slate-400');
            });

            // Show selected tab
            document.getElementById(tabId).classList.remove('hidden');
            
            // Update selected nav
            let activeNav;
            if(tabId === 'tab-summary') { activeNav = document.getElementById('nav-summary'); document.getElementById('page-title').innerText = "สรุปรวม (Summary)"; }
            if(tabId === 'tab-production') { activeNav = document.getElementById('nav-production'); document.getElementById('page-title').innerText = "1. ผลิตรวม (Production)"; }
            if(tabId === 'tab-completed') { activeNav = document.getElementById('nav-completed'); document.getElementById('page-title').innerText = "2. งาน Completed"; }
            
            activeNav.classList.remove('text-slate-600', 'hover:bg-slate-50');
            activeNav.classList.add('bg-indigo-50', 'text-indigo-700');
            activeNav.querySelector('svg').classList.remove('text-slate-400');
            activeNav.querySelector('svg').classList.add('text-indigo-500');

            // Close mobile menu if open
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        }

        // Modal Logic
        function openFilterModal() { document.getElementById('filter-modal').classList.remove('hidden'); }
        function closeFilterModal() { document.getElementById('filter-modal').classList.add('hidden'); }
        function applyFiltersAndClose() {
            closeFilterModal();
            applyFilters();
        }

        async function init() {
            showLoading(true);
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Network Error");
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                globalData = data;
                
                // Extract machines
                const mSet = new Set();
                globalData.forEach(r => {
                    if (r.machine && r.machine.trim() !== '') mSet.add(r.machine.trim());
                });
                uniqueMachines = Array.from(mSet).sort();
                renderMachineChips();

                // Set Dates
                if(globalData.length > 0) {
                    const validDates = globalData.map(d => new Date(d.date)).filter(d => !isNaN(d));
                    validDates.sort((a,b) => a - b);
                    const maxDate = validDates[validDates.length - 1];
                    
                    const p2End = new Date(maxDate);
                    const p2Start = new Date(p2End); p2Start.setDate(p2Start.getDate() - 6);
                    document.getElementById('p2EndDate').value = p2End.toISOString().split('T')[0];
                    document.getElementById('p2StartDate').value = p2Start.toISOString().split('T')[0];

                    const p1End = new Date(p2Start); p1End.setDate(p1End.getDate() - 1);
                    const p1Start = new Date(p1End); p1Start.setDate(p1Start.getDate() - 6);
                    document.getElementById('p1EndDate').value = p1End.toISOString().split('T')[0];
                    document.getElementById('p1StartDate').value = p1Start.toISOString().split('T')[0];
                }

                updateStatusBadge('success');
                showLoading(false);
                applyFilters();

            } catch (err) {
                updateStatusBadge('error');
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
                showLoading(false);
            }
        }

        function updateStatusBadge(status) {
            const badge = document.getElementById('connection-badge');
            const dot = document.getElementById('conn-dot');
            const txt = document.getElementById('conn-text');
            badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold";
            dot.className = "w-2 h-2 rounded-full";
            if (status === 'success') {
                badge.classList.add('bg-emerald-50', 'text-emerald-600', 'border', 'border-emerald-200');
                dot.classList.add('bg-emerald-500'); txt.innerText = "Connected";
            } else if (status === 'error') {
                badge.classList.add('bg-rose-50', 'text-rose-600', 'border', 'border-rose-200');
                dot.classList.add('bg-rose-500'); txt.innerText = "Offline";
            }
        }

        function showLoading(show) {
            if (show) {
                document.getElementById('loading-skeleton').classList.remove('hidden');
                document.getElementById('dashboard-body').classList.add('hidden');
            } else {
                document.getElementById('loading-skeleton').classList.add('hidden');
                document.getElementById('dashboard-body').classList.remove('hidden');
            }
        }

        function renderMachineChips() {
            const container = document.getElementById('machine-filters');
            container.innerHTML = '';
            uniqueMachines.forEach(m => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 chip-selected`;
                btn.innerText = m;
                btn.dataset.val = m;
                btn.dataset.selected = "true";
                btn.onclick = () => {
                    btn.dataset.selected = btn.dataset.selected === "true" ? "false" : "true";
                    btn.className = btn.dataset.selected === "true" ? 
                        `px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 chip-selected` : 
                        `px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 chip-unselected`;
                };
                container.appendChild(btn);
            });
        }

        function toggleAllMachines() {
            allMachinesSelected = !allMachinesSelected;
            const btns = document.querySelectorAll('#machine-filters button');
            btns.forEach(btn => {
                btn.dataset.selected = allMachinesSelected ? "true" : "false";
                btn.className = allMachinesSelected ? 
                    `px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 chip-selected` : 
                    `px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 chip-unselected`;
            });
        }

        function formatD(dateObj) {
            const d = dateObj.getDate().toString().padStart(2, '0');
            const m = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            return `${d}/${m}`;
        }

        function applyFilters() {
            const p1S_str = document.getElementById('p1StartDate').value;
            const p1E_str = document.getElementById('p1EndDate').value;
            const p2S_str = document.getElementById('p2StartDate').value;
            const p2E_str = document.getElementById('p2EndDate').value;

            if(!p1S_str || !p1E_str || !p2S_str || !p2E_str) {
                alert("กรุณาเลือกวันที่ให้ครบถ้วน");
                return;
            }

            const p1S = new Date(p1S_str); p1S.setHours(0,0,0,0);
            const p1E = new Date(p1E_str); p1E.setHours(23,59,59,999);
            const p2S = new Date(p2S_str); p2S.setHours(0,0,0,0);
            const p2E = new Date(p2E_str); p2E.setHours(23,59,59,999);

            const selectedMachines = Array.from(document.querySelectorAll('#machine-filters button'))
                                          .filter(b => b.dataset.selected === "true")
                                          .map(b => b.dataset.val);

            if(selectedMachines.length === 0) {
                alert("กรุณาเลือกเครื่องจักรอย่างน้อย 1 เครื่อง");
                return;
            }

            const p1Label = `${formatD(p1S)} - ${formatD(p1E)}`;
            const p2Label = `${formatD(p2S)} - ${formatD(p2E)}`;
            
            // Update Active Filters Display
            document.getElementById('active-filters-display').innerHTML = `
                <span class="text-slate-500 mr-2">กำลังแสดงข้อมูล:</span>
                <span class="bg-slate-100 border border-slate-200 text-slate-600 px-2.5 py-1 rounded-md"><strong>ช่วงที่ 1:</strong> ${p1Label}</span>
                <span class="bg-indigo-50 border border-indigo-100 text-indigo-700 px-2.5 py-1 rounded-md"><strong>ช่วงที่ 2:</strong> ${p2Label}</span>
                <span class="bg-slate-100 border border-slate-200 text-slate-600 px-2.5 py-1 rounded-md"><strong>เครื่องจักร:</strong> ${selectedMachines.length === uniqueMachines.length ? 'ทั้งหมด' : selectedMachines.length + ' เครื่อง'}</span>
            `;

            document.getElementById('sum-th-prev').innerHTML = `<span class="text-[10px] text-slate-400 font-normal block leading-none mb-1">อดีต</span>${p1Label}`;
            document.getElementById('sum-th-curr').innerHTML = `<span class="text-[10px] text-indigo-400 font-bold block leading-none mb-1">ปัจจุบัน</span>${p2Label}`;

            processData(p1S, p1E, p2S, p2E, selectedMachines, p1Label, p2Label);
        }

        function processData(p1S, p1E, p2S, p2E, selectedMachines, p1Label, p2Label) {
            
            // For TAB 3: Summary (Overall Comparison)
            let sumData = {};
            let totalPrev = 0; let totalCurr = 0;
            
            // For TAB 1: Production Breakdown (Only Period 2)
            let prodData = {};
            let mpdReal = 0; let mpdSample = 0; let mpdRepair = 0;

            // For TAB 2: Completed (Only Period 2)
            let completedJobs = [];
            let onTimeCount = 0; let lateCount = 0;

            selectedMachines.forEach(m => { 
                sumData[m] = { prev: 0, curr: 0 }; 
                prodData[m] = { real: 0, sample: 0, repair: 0 };
            });

            globalData.forEach(row => {
                const d = new Date(row.date);
                if(isNaN(d)) return;

                const inP1 = d >= p1S && d <= p1E;
                const inP2 = d >= p2S && d <= p2E;
                const m = row.machine ? row.machine.trim() : "ไม่ระบุ";
                const jType = row.jobType ? row.jobType.trim() : "";
                const qty = Number(row.qty) || 0;

                if (selectedMachines.includes(m)) {
                    
                    // --- DATA FOR TAB 3 (Summary Comparison - ALL TYPES) ---
                    if (inP1) { sumData[m].prev += qty; totalPrev += qty; }
                    if (inP2) { sumData[m].curr += qty; totalCurr += qty; }

                    // --- DATA FOR TAB 1 (Production Breakdown - Period 2 Only) ---
                    if (inP2) {
                        if(jType.includes("ผลิตจริง")) { prodData[m].real += qty; mpdReal += qty; }
                        else if(jType.includes("ขึ้นตัวอย่าง")) { prodData[m].sample += qty; mpdSample += qty; }
                        else if(jType.includes("ซ่อม") || jType.includes("ผลิตซ่อม")) { prodData[m].repair += qty; mpdRepair += qty; }
                        else { /* Other types map to real as fallback */ prodData[m].real += qty; mpdReal += qty; }
                    }

                    // --- DATA FOR TAB 2 (Completed - Period 2 Only) ---
                    if (inP2 && row.status && row.status.toLowerCase() === "completed") {
                        let diffDays = "-";
                        if (row.dueDate) {
                            const due = new Date(row.dueDate);
                            diffDays = Math.round((due.getTime() - d.getTime()) / (1000*3600*24));
                            if (diffDays >= 0) onTimeCount++; else lateCount++;
                        }
                        completedJobs.push({ ...row, diffDays });
                    }
                }
            });

            renderSummaryTab(sumData, p1Label, p2Label, totalPrev, totalCurr, completedJobs.length);
            renderProductionTab(prodData, mpdReal, mpdSample, mpdRepair);
            renderCompletedTab(completedJobs, onTimeCount, lateCount);
        }

        // ==========================================
        // RENDER: TAB 3 (SUMMARY)
        // ==========================================
        function renderSummaryTab(dataObj, p1Label, p2Label, totalP, totalC, compCount) {
            const kpiContainer = document.getElementById('kpi-container');
            const diff = totalC - totalP;
            const isPos = diff >= 0;
            const pct = totalP !== 0 ? ((Math.abs(diff) / totalP) * 100).toFixed(1) : (totalC > 0 ? 100 : 0);
            const trColor = isPos ? 'text-emerald-600' : 'text-rose-500';
            
            kpiContainer.innerHTML = `
                <div class="glass-card rounded-2xl p-5 border-l-4 border-indigo-500 flex flex-col justify-center">
                    <p class="text-sm font-semibold text-slate-500 mb-1">ยอดผลิตรวมทั้งหมด (ช่วงที่ 2)</p>
                    <h2 class="text-3xl font-bold text-slate-800">${totalC.toLocaleString()} <span class="text-sm font-medium text-slate-500">ชิ้น</span></h2>
                </div>
                <div class="glass-card rounded-2xl p-5 border-l-4 ${isPos ? 'border-emerald-500' : 'border-rose-500'} flex flex-col justify-center">
                    <p class="text-sm font-semibold text-slate-500 mb-1">อัตราการเติบโตเทียบอดีต</p>
                    <div class="flex items-end gap-2">
                        <h2 class="text-3xl font-bold ${trColor}">${isPos?'+':''}${pct}%</h2>
                        <span class="text-sm font-medium text-slate-400 mb-1">(${isPos?'+':''}${diff.toLocaleString()} ชิ้น)</span>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5 border-l-4 border-slate-700 flex flex-col justify-center">
                    <p class="text-sm font-semibold text-slate-500 mb-1">จำนวนงานที่เสร็จสิ้น (Completed)</p>
                    <h2 class="text-3xl font-bold text-slate-800">${compCount} <span class="text-sm font-medium text-slate-500">งาน</span></h2>
                </div>
            `;

            const tbody = document.getElementById('summary-tbody');
            tbody.innerHTML = '';
            const labels = [], dPrev = [], dCurr = [];
            let hasData = false;

            Object.keys(dataObj).forEach(m => {
                const p = dataObj[m].prev; const c = dataObj[m].curr;
                if(p === 0 && c === 0) return; 
                hasData = true;

                const mDiff = c - p;
                const mPct = p !== 0 ? ((Math.abs(mDiff) / p) * 100).toFixed(1) : (c > 0 ? 100 : 0);
                const mIsPos = mDiff >= 0;
                const cColor = mIsPos ? 'text-emerald-600' : 'text-rose-500';
                const bgPill = mIsPos ? 'bg-emerald-50' : 'bg-rose-50';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 transition-colors group">
                        <td class="px-5 py-3 font-bold text-[#3b5998]">${m}</td>
                        <td class="px-5 py-3 text-right text-slate-500 font-medium">${p.toLocaleString()}</td>
                        <td class="px-5 py-3 text-right text-indigo-700 font-bold bg-indigo-50/30">${c.toLocaleString()}</td>
                        <td class="px-5 py-3 text-right font-bold ${cColor}">${mIsPos?'+':''}${mDiff.toLocaleString()}</td>
                        <td class="px-5 py-3 text-right">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold ${cColor} ${bgPill}">
                                ${mIsPos?'↑':'↓'} ${mPct}%
                            </span>
                        </td>
                    </tr>
                `;
                labels.push(m); dPrev.push(p); dCurr.push(c);
            });

            if(!hasData) tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">ไม่มีข้อมูลตามเงื่อนไขที่เลือก</td></tr>`;

            const ctx = document.getElementById('summaryChart').getContext('2d');
            if(summaryChartInstance) summaryChartInstance.destroy();
            summaryChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: p1Label, data: dPrev, backgroundColor: '#cbd5e1', borderRadius: 4, barPercentage: 0.6 },
                        { label: p2Label, data: dCurr, backgroundColor: '#6366f1', borderRadius: 4, barPercentage: 0.6 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 6, font:{size: 11} } },
                        datalabels: { anchor: 'end', align: 'top', font: { weight: 'bold', size: 10 }, color: '#64748b', formatter: (v) => v===0?'':v.toLocaleString() }
                    },
                    scales: { y: { display: false, grid: { display: false } }, x: { grid: { display: false } } },
                    layout: { padding: { top: 30 } }
                }
            });
        }

        // ==========================================
        // RENDER: TAB 1 (PRODUCTION BREAKDOWN)
        // ==========================================
        function renderProductionTab(prodData, mpdReal, mpdSample, mpdRepair) {
            const container = document.getElementById('mpd-breakdown-container');
            const total = mpdReal + mpdSample + mpdRepair;
            
            container.innerHTML = `
                <div class="glass-card rounded-xl p-5 border-t-4 border-blue-500 shadow-sm flex flex-col justify-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ผลิตจริง</p>
                    <h2 class="text-3xl font-bold text-slate-800">${mpdReal.toLocaleString()} <span class="text-sm font-medium text-slate-500">ชิ้น</span></h2>
                </div>
                <div class="glass-card rounded-xl p-5 border-t-4 border-amber-400 shadow-sm flex flex-col justify-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ขึ้นตัวอย่าง</p>
                    <h2 class="text-3xl font-bold text-slate-800">${mpdSample.toLocaleString()} <span class="text-sm font-medium text-slate-500">ชิ้น</span></h2>
                </div>
                <div class="glass-card rounded-xl p-5 border-t-4 border-rose-400 shadow-sm flex flex-col justify-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ผลิตซ่อม</p>
                    <h2 class="text-3xl font-bold text-slate-800">${mpdRepair.toLocaleString()} <span class="text-sm font-medium text-slate-500">ชิ้น</span></h2>
                </div>
            `;

            const tbody = document.getElementById('production-tbody');
            tbody.innerHTML = '';
            let hasData = false;
            
            Object.keys(prodData).forEach(m => {
                const row = prodData[m];
                const rTotal = row.real + row.sample + row.repair;
                if(rTotal === 0) return;
                hasData = true;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 transition-colors group">
                        <td class="px-6 py-4 font-bold text-[#3b5998]">${m}</td>
                        <td class="px-6 py-4 text-right text-slate-700">${row.real.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-slate-700">${row.sample.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-slate-700">${row.repair.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right font-bold text-indigo-700 bg-indigo-50/20">${rTotal.toLocaleString()}</td>
                    </tr>
                `;
            });
            if(!hasData) tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">ไม่มีข้อมูลตามเงื่อนไขที่เลือก</td></tr>`;
        }

        // ==========================================
        // RENDER: TAB 2 (COMPLETED)
        // ==========================================
        function renderCompletedTab(jobs, onTime, late) {
            document.getElementById('comp-kpi-count').innerText = jobs.length.toLocaleString();
            document.getElementById('comp-kpi-ontime').innerText = onTime.toLocaleString();
            document.getElementById('comp-kpi-late').innerText = late.toLocaleString();

            const tbody = document.getElementById('completed-tbody');
            tbody.innerHTML = '';

            if(jobs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-slate-400">ไม่พบรายการ Completed ตามเงื่อนไขที่เลือก</td></tr>`;
            } else {
                jobs.forEach(j => {
                    const isLate = isNaN(j.diffDays) ? false : j.diffDays < 0;
                    const dColor = isNaN(j.diffDays) ? 'text-slate-400' : (isLate ? 'text-rose-500' : 'text-emerald-600');
                    const badgeStr = isLate ? `<span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-[10px] font-bold ml-2">ล่าช้า</span>` : `<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[10px] font-bold ml-2">ตรงเวลา</span>`;
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 border-b border-slate-100 transition-colors">
                            <td class="px-5 py-3 font-mono text-slate-600 font-bold">${j.jobId || '-'}</td>
                            <td class="px-5 py-3 text-[#3b5998] font-semibold">${j.machine || '-'}</td>
                            <td class="px-5 py-3 text-right font-bold flex items-center justify-end">
                                <span class="${dColor}">${j.diffDays}</span>
                                ${badgeStr}
                            </td>
                        </tr>
                    `;
                });
            }

            const ctx = document.getElementById('completedChart').getContext('2d');
            if(completedChartInstance) completedChartInstance.destroy();
            
            if(jobs.length === 0) {
                // Empty Chart
                completedChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['ไม่มีข้อมูล'], datasets: [{ data: [1], backgroundColor: ['#f1f5f9'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, cutout: '80%' } });
            } else {
                completedChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['ตรงเวลา/ก่อนกำหนด', 'ล่าช้า'],
                        datasets: [{ data: [onTime, late], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0, hoverOffset: 4 }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { font:{family:'Sarabun', size: 12} } },
                            datalabels: { color: '#ffffff', font: { weight: 'bold', size: 14 }, formatter: (v) => v>0?v:'' }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
