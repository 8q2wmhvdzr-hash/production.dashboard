<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Production Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold mb-6">Production Dashboard</h1>
        
        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">1. ผลิตรวม</h2>
            <div class="flex gap-4 mb-4">
                <input type="date" id="dateProd" class="border p-2 rounded">
                <button onclick="filterProd()" class="bg-blue-600 text-white px-4 py-2 rounded">ค้นหา</button>
            </div>
            <div id="resultProd" class="text-gray-700">เลือกวันที่เพื่อดูข้อมูล</div>
        </div>

        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">2. งาน Completed</h2>
            <div class="flex gap-4 mb-4">
                <input type="date" id="dateComp" class="border p-2 rounded">
                <button onclick="filterComp()" class="bg-green-600 text-white px-4 py-2 rounded">ค้นหา</button>
            </div>
            <div id="resultComp" class="text-gray-700">เลือกวันที่เพื่อดูข้อมูล</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyM_03O8IYUSQLXv3Y1akVQw3uloVZArm24Jf1PbwQ04VdL2TK0INlg2fnYDvYvf6M7/exec";
        let globalData = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                console.log("Data loaded:", globalData);
            } catch (err) {
                console.error(err);
            }
        }

        function filterProd() {
            const d = document.getElementById('dateProd').value;
            const res = globalData.filter(r => r.date === d);
            document.getElementById('resultProd').innerText = `พบ ${res.length} รายการ`;
        }

        function filterComp() {
            const d = document.getElementById('dateComp').value;
            const res = globalData.filter(r => r.date === d && r.status === "Completed");
            document.getElementById('resultComp').innerText = `พบ ${res.length} งานที่เสร็จแล้ว`;
        }

        window.onload = init;
    </script>
</body>
</html>
